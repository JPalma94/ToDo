<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="description" content="ToDo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ToDo" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/appIcon.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>ToDo</title>
</head>
<body>
  <main>
    <h1>ToDo</h1>

    <nav class="page-nav">
      <button class="nav-btn active" data-page="home">Home</button>
      <button class="nav-btn" data-page="all-items">All Items</button>
    </nav>

    <section id="page-home">
      <div class="input-row">
        <input type="text" id="new-item" placeholder="Add an item..." autocomplete="off" />
        <button id="add-btn">Add</button>
      </div>
      <ul id="todo-list"></ul>
    </section>

    <section id="page-all-items" hidden></section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
